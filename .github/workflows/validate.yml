name: Validate

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  # HACS validates the repo's default-branch state (what a user would
  # actually install), and 404s confusingly on a branch that hasn't been
  # merged yet - see https://github.com/hacs/integration/issues/4229.
  # Only run it once there's something on main to validate.
  hacs:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
